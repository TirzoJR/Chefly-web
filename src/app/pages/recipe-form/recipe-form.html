<div class="max-w-3xl mx-auto p-6 bg-white mt-10 mb-20">
  <h2 class="text-3xl font-bold text-gray-900 mb-8">{{ isEditMode ? 'Editar Receta' : 'Crear Nueva Receta' }}</h2>

  <form [formGroup]="recipeForm" (ngSubmit)="onSubmit()" class="space-y-8">

    <div class="p-6 border border-gray-200 rounded-2xl shadow-sm space-y-5">
      <h3 class="text-lg font-semibold text-gray-800">Información Básica</h3>

      <div>
        <label class="block text-sm font-medium text-gray-900 mb-1">Título *</label>
        <input type="text" formControlName="title" placeholder="Ej: Pasta Carbonara Italiana"
               class="w-full bg-gray-100 border-transparent rounded-lg p-3 focus:bg-white focus:border-gray-300 focus:ring-0 outline-none transition-colors"
               [ngClass]="{'border-red-500 bg-red-50': isInvalid('title')}">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-900 mb-1">Descripción *</label>
        <textarea formControlName="description" placeholder="Describe tu receta..." rows="3"
                  class="w-full bg-gray-100 border-transparent rounded-lg p-3 focus:bg-white focus:border-gray-300 focus:ring-0 outline-none transition-colors"
                  [ngClass]="{'border-red-500 bg-red-50': isInvalid('description')}"></textarea>
      </div>

      <div class="border-t border-gray-100 pt-5">
        <label class="block text-sm font-medium text-gray-900 mb-3">Imagen de la Receta *</label>

        <div class="flex border-b border-gray-200 mb-4">
          <button type="button" (click)="imageSource = 'file'; setValidations();"
                  class="py-2 px-4 text-sm font-medium border-b-2"
                  [ngClass]="imageSource === 'file' ? 'border-[#0a0f2c] text-[#0a0f2c]' : 'border-transparent text-gray-500 hover:text-gray-700'">
            Subir Archivo Local
          </button>
          <button type="button" (click)="imageSource = 'url'; setValidations();"
                  class="py-2 px-4 text-sm font-medium border-b-2"
                  [ngClass]="imageSource === 'url' ? 'border-[#0a0f2c] text-[#0a0f2c]' : 'border-transparent text-gray-500 hover:text-gray-700'">
            Pegar URL de Imagen
          </button>
        </div>

        <div *ngIf="imageSource === 'file'" class="space-y-3">
          <div class="flex items-center gap-4">
            <label for="fileInput" class="cursor-pointer inline-flex items-center px-4 py-2 border border-gray-300 rounded-lg shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50">
              <svg class="-ml-1 mr-2 h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
              </svg>
              Seleccionar Imagen
            </label>
            <input id="fileInput" type="file" (change)="onFileSelected($event)" accept="image/*" class="sr-only">

            <span *ngIf="selectedFile" class="text-sm text-gray-600">{{ selectedFile.name }}</span>
            <button *ngIf="selectedFile" type="button" (click)="clearImage()" class="text-xs text-red-500 hover:text-red-700">Remover</button>
          </div>

          <div *ngIf="imagePreview" class="mt-3 relative inline-block">
            <img [src]="imagePreview" class="h-32 w-48 object-cover rounded-lg border border-gray-200 shadow-sm">
            <div *ngIf="isUploading" class="absolute inset-0 bg-black bg-opacity-50 rounded-lg flex items-center justify-center p-2">
              <div class="w-full bg-gray-200 rounded-full h-1.5">
                <div class="bg-orange-500 h-1.5 rounded-full" [style.width.%]="uploadProgress"></div>
              </div>
            </div>
          </div>
        </div>

        <div *ngIf="imageSource === 'url'">
          <input type="text" formControlName="imageUrl" placeholder="https://ejemplo.com/imagen.jpg"
                 class="w-full bg-gray-100 border-transparent rounded-lg p-3 focus:bg-white focus:border-gray-300 focus:ring-0 outline-none transition-colors"
                 [ngClass]="{'border-red-500 bg-red-50': isInvalid('imageUrl')}">
          <span *ngIf="isInvalid('imageUrl')" class="text-xs text-red-500 mt-1">La URL de la imagen es obligatoria.</span>
        </div>
      </div>

      <div class="grid grid-cols-1 md:grid-cols-2 gap-5 pt-3">
        <div>
  <label class="block text-sm font-medium text-gray-900 mb-1">Categoría *</label>
  <select formControlName="category"
          class="w-full bg-gray-100 border-transparent rounded-lg p-3 focus:bg-white outline-none transition-colors"
          [ngClass]="{'border-red-500 bg-red-50': isInvalid('category')}">
    <option value="">Selecciona categoría</option>
    <option *ngFor="let cat of availableCategories" [value]="cat">{{ cat }}</option>
  </select>
</div>
        <div>
          <label class="block text-sm font-medium text-gray-900 mb-1">Dificultad *</label>
          <select formControlName="difficulty" class="w-full bg-gray-100 border-transparent rounded-lg p-3 focus:bg-white outline-none transition-colors"
                  [ngClass]="{'border-red-500 bg-red-50': isInvalid('difficulty')}">
            <option value="">Selecciona dificultad</option>
            <option value="Fácil">Fácil</option>
            <option value="Intermedio">Intermedio</option>
            <option value="Difícil">Difícil</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-900 mb-1">Tiempo de cocción (min) *</label>
          <input type="number" formControlName="time" placeholder="30" min="1" (keydown)="preventNegative($event)"
                 class="w-full bg-gray-100 border-transparent rounded-lg p-3 focus:bg-white outline-none transition-colors"
                 [ngClass]="{'border-red-500 bg-red-50': isInvalid('time')}">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-900 mb-1">Porciones *</label>
          <input type="number" formControlName="portions" placeholder="4" min="1" (keydown)="preventNegative($event)"
                 class="w-full bg-gray-100 border-transparent rounded-lg p-3 focus:bg-white outline-none transition-colors"
                 [ngClass]="{'border-red-500 bg-red-50': isInvalid('portions')}">
        </div>
      </div>
    </div>

    <div class="p-6 border border-gray-200 rounded-2xl shadow-sm">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-semibold text-gray-800">Ingredientes</h3>
        <button type="button" (click)="addIngredient()" class="px-3 py-1 border border-gray-300 rounded-lg text-sm font-medium flex items-center hover:bg-gray-50 transition-colors">
          <span class="mr-1">+</span> Añadir
        </button>
      </div>

      <div formArrayName="ingredients" class="space-y-3">
        <div *ngFor="let ing of ingredients.controls; let i=index" class="flex items-center gap-3">
          <input [formControlName]="i" type="text" [placeholder]="'Ingrediente ' + (i + 1)"
                 class="flex-1 bg-gray-100 border-transparent rounded-lg p-3 outline-none focus:bg-white focus:border-gray-300 transition-colors"
                 [ngClass]="{'border-red-500 bg-red-50': ingredients.controls[i].invalid && ingredients.controls[i].touched}">
          <button type="button" (click)="removeIngredient(i)" class="text-gray-500 hover:text-red-500 font-bold p-2 transition-colors">✕</button>
        </div>
      </div>
    </div>

    <div class="p-6 border border-gray-200 rounded-2xl shadow-sm">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-semibold text-gray-800">Pasos de Preparación</h3>
        <button type="button" (click)="addStep()" class="px-3 py-1 border border-gray-300 rounded-lg text-sm font-medium flex items-center hover:bg-gray-50 transition-colors">
          <span class="mr-1">+</span> Añadir
        </button>
      </div>

      <div formArrayName="steps" class="space-y-3">
        <div *ngFor="let step of steps.controls; let i=index" class="flex items-center gap-4">
          <div class="w-8 h-8 rounded-full bg-[#0a0f2c] text-white flex items-center justify-center font-bold flex-shrink-0">
            {{ i + 1 }}
          </div>
          <input [formControlName]="i" type="text" [placeholder]="'Paso ' + (i + 1)"
                 class="flex-1 bg-gray-100 border-transparent rounded-lg p-3 outline-none focus:bg-white focus:border-gray-300 transition-colors"
                 [ngClass]="{'border-red-500 bg-red-50': steps.controls[i].invalid && steps.controls[i].touched}">
          <button type="button" (click)="removeStep(i)" class="text-gray-500 hover:text-red-500 font-bold p-2 transition-colors">✕</button>
        </div>
      </div>
    </div>

    <div class="flex items-center justify-between pt-4 gap-4">
      <button type="submit" [disabled]="isUploading"
              class="flex-1 py-3 bg-[#0a0f2c] text-white rounded-lg font-semibold hover:bg-gray-800 transition-colors disabled:bg-gray-400">
        {{ isUploading ? 'Subiendo Imagen...' : (isEditMode ? 'Guardar Cambios' : 'Crear Receta') }}
      </button>
      <button type="button"
        (click)="onCancel()"
        class="px-6 py-3 bg-white border border-gray-300 rounded-lg font-semibold hover:bg-gray-50 transition-colors">
  Cancelar
</button>
    </div>

  </form>
</div>
